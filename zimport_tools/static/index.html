<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZImport-tools — 数据导入</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div id="loading" class="card">正在识别身份…</div>

  <div id="error" class="card hidden">
    <h2>无法使用</h2>
    <p id="errorMsg" class="err"></p>
    <button id="retryBtn">重试</button>
  </div>

  <div id="main" class="card hidden">
    <p>当前登录:<b id="who"></b></p>
    <div id="resumeBanner" class="hidden"></div>
    <div id="adminBox" class="hidden">
      <label>目标账户(管理员):<input id="targetAccount" type="search"
        list="accountList" autocomplete="off" spellcheck="false"
        placeholder="留空=导入到自己;或输入 2+ 字符搜索"></label>
      <datalist id="accountList"></datalist>
    </div>
    <label>目标文件夹:
      <span class="folder-row">
        <select id="folder"></select>
        <button id="newFolderBtn" type="button" class="ghost">+ 新建</button>
      </span>
    </label>
    <label>选择文件(多个 .eml 或一个 .tgz):
      <input id="files" type="file" multiple accept=".eml,.tgz,.tar.gz">
    </label>
    <label>任务备注(可选,便于以后辨认):
      <input id="label" type="text" maxlength="120"
             placeholder="例:Q3 历史邮件迁移">
    </label>
    <div class="actions">
      <button id="startBtn" type="button" class="primary">开始导入</button>
    </div>

    <div id="uploadStage" class="upload-progress hidden">
      <div class="upload-label" id="uploadLabel"></div>
      <div class="bar"><div class="bar-fill" id="uploadBar"></div></div>
      <div class="muted" id="uploadEta"></div>
    </div>
    <div id="queueStage" class="muted hidden"></div>

    <h3>我的任务</h3>
    <div class="task-toolbar">
      <button id="refreshBtn" type="button" class="ghost">刷新</button>
    </div>
    <table id="tasks"><thead><tr>
      <th>任务</th><th>备注</th><th>账户</th><th>状态</th>
      <th>进度</th><th>跳过</th><th>失败</th><th></th>
    </tr></thead><tbody></tbody></table>
  </div>

  <footer id="footer">ZImport-tools <span id="version">…</span></footer>

  <div id="toastHost" class="toast-host"></div>

  <script src="static/app.js"></script>
</body>
</html>
